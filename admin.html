<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(localStorage.getItem('userRol') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - SISCONTED</title>
    
    <link rel="stylesheet" href="global.css">
    <style>
        .main { padding: 30px; flex: 1; overflow-y: auto; background: var(--bg); }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card h3 { font-size: 0.7rem; color: var(--text-muted); margin: 0 0 10px 0; text-transform: uppercase; }
        .stat-card p { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin: 0; font-family: 'Orbitron', sans-serif; }
        
        .admin-controls { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        
        @media (max-width: 768px) {
            .main { padding: 15px; }
            .header-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="UI.toggleSidebar()">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">📊</div>
            <div class="brand-name">SISCONTED</div>
        </div>
        <nav>
            <a href="index.html">🏠 Inventario Local</a>
            <a href="admin.html" class="active">📊 Dashboard Ventas</a>
            <a href="inventario.html">📦 Inventario Global</a>
            <a href="reportes.html">📂 Reportes</a>
            <a href="config.html">⚙️ Configuración</a>
            <a href="#" onclick="cerrarSesion()" class="btn-logout" style="margin-top:20px; border:1px solid rgba(239,68,68,0.3); color:#f87171;">🚪 Salir</a>
        </nav>
        <div style="margin-top: auto; padding: 15px; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border);">
            Admin: <span id="admin-badge">...</span>
        </div>
    </div>

    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
            <h1 style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; margin: 0; color:var(--accent);">REGISTRO DE VENTAS</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary btn-sm" onclick="exportarReporte()">📄 Excel</button>
                <button class="btn btn-primary btn-sm" onclick="exportarConsolidado()">📦 Consolidado</button>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-card">
                <h3>Ventas Totales</h3>
                <p id="total-ventas">$ 0</p>
            </div>
            <div class="stat-card">
                <h3>Utilidad</h3>
                <p id="total-utilidad" style="color:var(--success);">$ 0</p>
            </div>
            <div class="stat-card">
                <h3>Pedidos</h3>
                <p id="count-pedidos" style="color:white;">0</p>
            </div>
        </div>

        <div class="admin-controls">
            <div class="filters-grid">
                <div>
                    <label class="label-small">Desde</label>
                    <input type="date" id="f-inicio" class="form-control" onchange="cargarReporte()">
                </div>
                <div>
                    <label class="label-small">Hasta</label>
                    <input type="date" id="f-fin" class="form-control" onchange="cargarReporte()">
                </div>
                <div>
                    <label class="label-small">Cliente</label>
                    <input type="text" id="b-cliente" class="form-control" placeholder="Buscar..." onkeyup="cargarReporte()">
                </div>
                <div style="display:flex; align-items:flex-end;">
                    <button class="btn btn-success btn-sm" style="width:100%; height:42px;" onclick="guardarReporteJSON()">💾 Guardar Historial</button>
                </div>
            </div>
            <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha / Hora</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Utilidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-pedidos"></tbody>
            </table>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="ui-helpers.js"></script>
    <script>
        let listaFiltradaActual = [];
        let productosDB = [];
        let config = { empresa: {} };

        const ADMIN_NAME = localStorage.getItem('adminLogueado') || "Eduar Anderson Imbacuan";
        document.getElementById('admin-badge').innerText = ADMIN_NAME;

        async function init() {
            try {
                document.getElementById('f-inicio').value = API.getFechaLocal();
                document.getElementById('f-fin').value = API.getFechaLocal();
                await cargarReporte();
            } catch (e) { UI.showToast("Error al inicializar", "error"); }
        }

        function obtenerPrecioCompraHistorico(item) {
            if (item.precioCompra !== undefined && item.precioCompra !== null) return parseFloat(item.precioCompra);
            const orig = productosDB.find(prod => prod.codigo === item.referencia);
            return orig ? parseFloat(orig.precioCompra || 0) : 0;
        }

        async function cargarReporte() {
            try {
                const pedidos = await API.getPedidos();
                productosDB = await API.getProductos();
                config = await API.getConfig();
                
                const fIn = document.getElementById('f-inicio').value;
                const fFi = document.getElementById('f-fin').value;
                const query = document.getElementById('b-cliente').value.toLowerCase();

                let totalV = 0, totalU = 0, html = "";
                listaFiltradaActual = pedidos.filter(p => {
                    const fLocal = API.getFechaLocal(p.id);
                    const matchFechas = (fLocal >= fIn && fLocal <= fFi);
                    const matchCliente = (p.cliente || "").toLowerCase().includes(query);
                    return matchFechas && matchCliente;
                });

                [...listaFiltradaActual].reverse().forEach(p => {
                    let utilP = 0;
                    p.items.forEach(it => utilP += (parseFloat(it.precio) - obtenerPrecioCompraHistorico(it)) * it.cantidad);
                    totalV += parseFloat(p.total); totalU += utilP;

                    html += `<tr>
                        <td>${p.fecha}<br><small class="text-muted">${p.hora}</small></td>
                        <td><b>${p.cliente}</b></td>
                        <td class="text-accent" style="font-weight:700;">$${parseFloat(p.total).toLocaleString()}</td>
                        <td style="color:${utilP >= 0 ? 'var(--success)' : 'var(--danger)'}; font-weight:700;">$${utilP.toLocaleString()}</td>
                        <td>
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-secondary btn-sm" onclick="verDetalle(${p.id})">👁️</button>
                                <button class="btn btn-primary btn-sm" onclick="imprimirRecibo(${p.id})">🖨️</button>
                                <button class="btn btn-danger btn-sm" onclick="eliminarPedido(${p.id})">🗑️</button>
                            </div>
                        </td>
                    </tr>`;
                });

                document.getElementById('lista-pedidos').innerHTML = html || '<tr><td colspan="5" style="text-align:center; padding:30px; color:var(--text-muted);">No hay ventas registradas en este periodo.</td></tr>';
                document.getElementById('total-ventas').innerText = `$ ${totalV.toLocaleString()}`;
                document.getElementById('total-utilidad').innerText = `$ ${totalU.toLocaleString()}`;
                document.getElementById('count-pedidos').innerText = listaFiltradaActual.length;
            } catch (e) { UI.showToast("Error al cargar datos", "error"); }
        }

        async function verDetalle(id) {
            const p = listaFiltradaActual.find(x => x.id == id);
            if(!p) return;
            
            const tableHtml = `
                <div style="font-size:0.8rem; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                    <b>CLIENTE:</b> ${p.cliente}<br><b>ID:</b> ${p.id}<br><b>FECHA:</b> ${p.fecha} ${p.hora}
                </div>
                <table style="width:100%; font-size:0.8rem;">
                    <thead><tr><th align="left">PROD</th><th align="right">UNIT</th><th align="center">CANT</th><th align="right">SUB</th></tr></thead>
                    <tbody>
                        ${p.items.map(i => `<tr><td>${i.nombre}</td><td align="right">$${i.precio}</td><td align="center">${i.cantidad}</td><td align="right">$${(i.precio*i.cantidad).toLocaleString()}</td></tr>`).join('')}
                    </tbody>
                </table>
                <div style="text-align:right; margin-top:15px; font-weight:800; font-size:1.2rem; color:var(--accent);">TOTAL: $${parseFloat(p.total).toLocaleString()}</div>
            `;
            UI.showModal("Detalle de Venta", tableHtml);
        }

        function guardarReporteJSON() {
            if (!listaFiltradaActual.length) return UI.showToast("No hay datos", "warning");
            UI.confirm("GUARDAR REPORTE", "¿Deseas guardar este resumen en el historial?", async () => {
                try {
                    const resumen = {
                        id: Date.now(), fecha: new Date().toLocaleString(), admin: ADMIN_NAME,
                        rango: `${document.getElementById('f-inicio').value} / ${document.getElementById('f-fin').value}`,
                        ventas: document.getElementById('total-ventas').innerText,
                        utilidad: document.getElementById('total-utilidad').innerText,
                        pedidos: listaFiltradaActual.length
                    };
                    const hist = await API.getReportes(); hist.push(resumen); await API.saveReportes(hist);
                    UI.showToast("Reporte guardado", "success");
                } catch (e) { UI.showToast("Error", "error"); }
            });
        }

        async function exportarReporte() {
            if (!listaFiltradaActual.length) return UI.showToast("No hay datos", "warning");
            const { headerHtml, logoBase64 } = await API.getExcelHeader(6);
            let html = `<table border="1">${headerHtml}<tr><th colspan="6" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">REPORTE DE VENTAS</th></tr>`;
            html += `<tr><th style="background:#1e293b; color:white;">FECHA</th><th style="background:#1e293b; color:white;">CLIENTE</th><th style="background:#1e293b; color:white;">ID</th><th style="background:#1e293b; color:white;">PRODUCTOS</th><th style="background:#1e293b; color:white;">TOTAL</th><th style="background:#1e293b; color:white;">GANANCIA</th></tr>`;
            listaFiltradaActual.forEach(p => {
                let g = 0; p.items.forEach(i => g += (i.precio - obtenerPrecioCompraHistorico(i)) * i.cantidad);
                html += `<tr><td>${p.fecha}</td><td>${p.cliente}</td><td>'${p.id}</td><td>${p.items.map(i => i.nombre).join(', ')}</td><td align="right">$${parseFloat(p.total).toLocaleString()}</td><td align="right">$${g.toLocaleString()}</td></tr>`;
            });
            API.descargarExcelMHT(html + '</table>', `Ventas_${API.getFechaLocal()}`, logoBase64);
        }

        async function exportarConsolidado() {
            if (!listaFiltradaActual.length) return UI.showToast("No hay datos", "warning");
            const { headerHtml, logoBase64 } = await API.getExcelHeader(3);
            let dict = {};
            listaFiltradaActual.forEach(p => p.items.forEach(i => {
                if(!dict[i.nombre]) dict[i.nombre] = { ref: i.referencia || i.codigo, cant: 0, um: i.unidad || 'Und' };
                dict[i.nombre].cant += i.cantidad;
            }));
            let html = `<table border="1">${headerHtml}<tr><th colspan="3" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">CONSOLIDADO DE PRODUCTOS</th></tr><tr><th style="background:#1e293b; color:white;">REF</th><th style="background:#1e293b; color:white;">PRODUCTO</th><th style="background:#1e293b; color:white;">CANTIDAD</th></tr>`;
            Object.keys(dict).forEach(n => html += `<tr><td>'${dict[n].ref}</td><td>${n}</td><td align="center">${dict[n].cant} ${dict[n].um}</td></tr>`);
            API.descargarExcelMHT(html + '</table>', `Consolidado_${API.getFechaLocal()}`, logoBase64);
        }

        async function imprimirRecibo(id) {
            const p = listaFiltradaActual.find(x => x.id == id);
            if(!p) return;
            const { headerHtml, logoBase64 } = await API.getExcelHeader(5);
            let html = `<table border="1">${headerHtml}<tr><th colspan="5" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">RECIBO DE VENTA #${p.id}</th></tr><tr><th style="background:#1e293b; color:white;">PROD</th><th style="background:#1e293b; color:white;">UM</th><th style="background:#1e293b; color:white;">PRECIO</th><th style="background:#1e293b; color:white;">CANT</th><th style="background:#1e293b; color:white;">SUBTOTAL</th></tr>`;
            p.items.forEach(i => html += `<tr><td>${i.nombre}</td><td>${i.unidad || 'Und'}</td><td align="right">$${parseFloat(i.precio).toLocaleString()}</td><td align="center">${i.cantidad}</td><td align="right">$${(i.precio*i.cantidad).toLocaleString()}</td></tr>`);
            html += `<tr><th colspan="4" align="right"><b>TOTAL:</b></th><td align="right"><b>$${parseFloat(p.total).toLocaleString()}</b></td></tr></table>`;
            API.descargarExcelMHT(html, `Recibo_${p.id}`, logoBase64);
        }

        function eliminarPedido(id) {
            UI.confirm("ELIMINAR", "¿Deseas borrar este registro? Esta acción es irreversible.", async () => {
                UI.showToast("Eliminación no implementada en backend", "info");
            });
        }

        function cerrarSesion() { localStorage.clear(); window.location.href = 'login.html'; }
        window.onload = init;
    </script>
</body>
</html>
