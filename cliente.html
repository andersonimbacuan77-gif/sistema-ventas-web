<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(!localStorage.getItem('userLogin')) {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - SISCONTED</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .header-app {
            background: var(--card-bg);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .customer-greeting h2 { margin: 0; font-size: 1.1rem; font-family: 'Orbitron', sans-serif; color: var(--accent); }
        .customer-greeting p { margin: 0; font-size: 0.75rem; color: var(--text-muted); }

        .catalog-container { flex: 1; overflow-y: auto; padding: 20px; }
        
        .controls-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-container { flex: 1; position: relative; min-width: 250px; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        .cat-filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 20px; }
        .cat-filters::-webkit-scrollbar { height: 3px; }

        /* Grid specific to Catalog */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }
        .product-item:hover { border-color: var(--accent); transform: translateY(-3px); }
        .product-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }        .product-item h3 { margin: 0; font-size: 0.85rem; height: 2.4rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
        .product-item .price { font-size: 1.1rem; font-weight: 800; color: var(--success); margin: 8px 0; }
        .product-item .stock { font-size: 0.65rem; color: var(--text-muted); }
        .product-item .stock.low { color: var(--danger); font-weight: bold; }

        .cart-summary {
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
        }

        .footer-payment {
            padding: 15px 25px;
            background: var(--card-bg);
            border-top: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .catalog-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .footer-payment { flex-direction: column; padding: 15px; gap: 15px; }
            .footer-payment .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="UI.toggleSidebar()">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">🛍️</div>
            <div class="brand-name">SISCONTED</div>
        </div>
        <nav>
            <a href="cliente.html" class="active">🛍️ Catálogo</a>
            <a href="index.html" id="link-admin" style="display:none;">⚙️ Panel Admin</a>
            <a href="#" onclick="cerrarSesion()" class="btn-logout" style="margin-top:20px; border:1px solid rgba(239,68,68,0.3); color:#f87171;">🚪 Salir</a>
        </nav>
        <div style="margin-top: auto; padding: 15px; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border);">
            BIENVENIDO:<br><b id="user-badge" style="color:white; text-transform:uppercase;">...</b>
        </div>
    </div>

    <div class="main-content">
        <div class="header-app">
            <div class="customer-greeting">
                <h2 id="titulo-saludo">👋 Cargando...</h2>
                <p>Arma tu pedido y confirma al finalizar</p>
            </div>
            <div class="cart-status" style="background:var(--accent-glow); padding:8px 15px; border-radius:30px; border:1px solid var(--accent); font-weight:800; font-size:0.9rem;">
                🛒 <span id="cart-count">0</span>
            </div>
        </div>

        <div class="catalog-container">
            <div class="controls-row">
                <div class="search-container">
                    <i>🔍</i>
                    <input type="text" id="buscador" class="form-control" placeholder="Buscar producto por nombre..." onkeyup="render()">
                </div>
                <button class="btn btn-secondary" onclick="togglevista()" id="btn-vista" style="width:45px;">🔲</button>
            </div>
            <div id="categorias" class="cat-filters"></div>
            <div id="lista" class="catalog-grid"></div>
        </div>

        <div class="cart-summary">
            <table>
                <thead>
                    <tr>
                        <th align="left">Producto</th>
                        <th align="right">Precio</th>
                        <th align="center">Cant</th>
                        <th align="right">Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="items-tabla"></tbody>
            </table>
        </div>

        <div class="footer-payment">
            <div style="font-family:'Orbitron'; font-size:1.4rem; color:var(--accent); font-weight:800;">
                TOTAL: <span id="total-dinero">$ 0</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="reiniciarPedido()">🔄 Limpiar</button>
                <button id="btn-confirmar" class="btn btn-primary" onclick="abrirModalPago()" disabled>🚀 FINALIZAR PEDIDO</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="ui-helpers.js"></script>
    <script>
        let productos = [];
        let config = {};
        let carrito = {};
        let vistaActual = 'grid';
        let categoriaActual = 'Todas';

        async function init() {
            try {
                productos = await API.getProductos();
                config = await API.getConfig();
                const rol = localStorage.getItem('userRol');
                if(rol === 'admin') document.getElementById('link-admin').style.display = 'block';
                const user = localStorage.getItem('nombreCliente') || "CLIENTE";
                document.getElementById('user-badge').innerText = user;
                document.getElementById('titulo-saludo').innerText = `👋 Hola, ${user.split(' ')[0]}`;
                renderCategorias();
                render();
            } catch (e) { UI.showToast("Error de conexión", "error"); }
        }

        function renderCategorias() {
            const container = document.getElementById('categorias');
            let html = `<button class="btn btn-sm ${categoriaActual==='Todas'?'btn-primary':'btn-secondary'}" onclick="filtrar('Todas')">Todas</button>`;
            if (config.categorias) {
                config.categorias.forEach(c => {
                    html += `<button class="btn btn-sm ${categoriaActual===c?'btn-primary':'btn-secondary'}" onclick="filtrar('${c}')">${c}</button>`;
                });
            }
            container.innerHTML = html;
        }

        function filtrar(cat) {
            categoriaActual = cat;
            renderCategorias();
            render();
        }

        function render() {
            const query = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => {
                const match = (p.nombre||"").toLowerCase().includes(query) || (p.codigo||"").toLowerCase().includes(query);
                return match && (categoriaActual === 'Todas' || p.categoria === categoriaActual);
            });

            const container = document.getElementById('lista');
            container.className = vistaActual === 'grid' ? 'catalog-grid' : 'list';
            
            container.innerHTML = filtrados.map(p => {
                const stock = parseInt(p.existencia) || 0;
                const yaIn = carrito[p.codigo] ? carrito[p.codigo].cantidad : 0;
                const disponible = stock - yaIn;

                return `
                    <div class="product-item ${stock <= 0 ? 'opacity-50' : ''}">
                        <img src="${p.imagen || 'https://via.placeholder.com/150?text=📦'}" onclick="UI.showModal('${p.nombre}', '<img src=\\'${p.imagen}\\' style=\\'width:100%; border-radius:10px;\\'>')">
                        <div style="flex:1;">
                            <span style="font-size: 0.6rem; color: var(--text-muted);">REF: ${p.codigo}</span>
                            <h3 style="text-transform:uppercase;">${p.nombre}</h3>
                            <div class="price">$${parseFloat(p.precio || 0).toLocaleString()}</div>
                            <div class="stock ${stock < 5 ? 'low' : ''}">${stock > 0 ? 'Disponible: '+stock : 'Agotado'}</div>
                        </div>
                        <div style="margin-top:10px;">
                            <div style="display:flex; align-items:center; gap:5px; margin-bottom:8px;">
                                <input type="number" id="qty-${p.codigo}" class="form-control" value="1" min="1" max="${disponible}" style="height:35px; text-align:center;" ${stock <= 0 ? 'disabled' : ''}>
                                <span style="font-size:0.7rem;">${p.unidad || 'UND'}</span>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="agregar('${p.codigo}')" style="width: 100%;" ${stock <= 0 ? 'disabled' : ''}>AÑADIR</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function agregar(ref) {
            const p = productos.find(x => x.codigo === ref);
            const qtyIn = document.getElementById(`qty-${ref}`);
            const cant = parseInt(qtyIn.value) || 1;
            const yaIn = carrito[ref] ? carrito[ref].cantidad : 0;

            if (p.existencia < (yaIn + cant)) return UI.showToast("Sin inventario suficiente", "warning");

            if (carrito[ref]) carrito[ref].cantidad += cant;
            else carrito[ref] = { ...p, cantidad: cant };

            UI.showToast("Producto añadido", "success");
            actualizarCarrito();
            render(); // Refresh to update input 'max'
        }

        function actualizarCarrito() {
            const tbody = document.getElementById('items-tabla');
            let total = 0; let count = 0;
            let html = "";
            
            for (let ref in carrito) {
                const it = carrito[ref];
                const sub = it.precio * it.cantidad;
                total += sub; count += it.cantidad;
                html += `
                    <tr>
                        <td><b>${it.nombre}</b></td>
                        <td align="right">$${it.precio.toLocaleString()}</td>
                        <td align="center"><input type="number" value="${it.cantidad}" onchange="editarCant('${ref}', this.value)" style="width:45px; background:none; border:1px solid var(--border); color:white; text-align:center;"></td>
                        <td align="right" class="text-accent"><b>$${sub.toLocaleString()}</b></td>
                        <td align="center"><button class="btn btn-danger btn-sm" style="padding:2px 8px;" onclick="eliminar('${ref}')">✕</button></td>
                    </tr>
                `;
            }
            tbody.innerHTML = html || '<tr><td colspan="5" align="center" style="padding:20px; color:var(--text-muted);">Sin productos seleccionados</td></tr>';
            document.getElementById('total-dinero').innerText = `$ ${total.toLocaleString()}`;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('btn-confirmar').disabled = total <= 0;
        }

        function editarCant(ref, val) {
            const n = parseInt(val);
            if (n <= 0) delete carrito[ref];
            else {
                const p = productos.find(x => x.codigo === ref);
                if(p.existencia < n) {
                    UI.showToast("Stock limitado", "warning");
                    carrito[ref].cantidad = p.existencia;
                } else {
                    carrito[ref].cantidad = n;
                }
            }
            actualizarCarrito();
            render();
        }

        function eliminar(ref) {
            delete carrito[ref];
            actualizarCarrito();
            render();
        }

        function togglevista() {
            vistaActual = vistaActual === 'grid' ? 'list' : 'grid';
            document.getElementById('btn-vista').innerText = vistaActual === 'grid' ? '🔲' : '☰';
            render();
        }

        function abrirModalPago() {
            const total = document.getElementById('total-dinero').innerText;
            const tableHtml = `
                <div style="font-size:0.85rem; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;">
                    ${Object.values(carrito).map(it => `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>${it.cantidad}x ${it.nombre}</span>
                            <span>$${(it.cantidad*it.precio).toLocaleString()}</span>
                        </div>
                    `).join('')}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <b style="font-size:1.2rem; color:var(--accent);">TOTAL:</b>
                    <b id="pago-total" style="font-size:1.5rem; color:var(--accent); font-family:'Orbitron';">${total}</b>
                </div>
                <div style="margin-bottom:15px;">
                    <label class="label-small">Efectivo Recibido:</label>
                    <input type="number" id="pago-recibido" class="form-control" oninput="calcularCambio()" placeholder="0" style="font-size:1.5rem; height:50px; text-align:center; color:var(--accent);">
                </div>
                <div style="text-align:center; padding:15px; background:rgba(0,0,0,0.2); border-radius:12px; margin-bottom:20px;">
                    <div class="label-small">SU CAMBIO:</div>
                    <div id="pago-cambio" style="font-size:1.8rem; color:var(--success); font-weight:800; font-family:'Orbitron';">$ 0</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-primary" style="flex:1;" onclick="guardarPedidoFinal()">CONFIRMAR VENTA</button>
                </div>
            `;
            UI.showModal("DETALLE DE PAGO", tableHtml);
            setTimeout(() => document.getElementById('pago-recibido').focus(), 100);
        }

        function calcularCambio() {
            const total = parseFloat(document.getElementById('pago-total').innerText.replace(/[^\d]/g, "")) || 0;
            const rec = parseFloat(document.getElementById('pago-recibido').value) || 0;
            const cambio = rec - total;
            document.getElementById('pago-cambio').innerText = `$ ${(cambio > 0 ? cambio : 0).toLocaleString()}`;
        }

        async function guardarPedidoFinal() {
            const total = parseFloat(document.getElementById('pago-total').innerText.replace(/[^\d]/g, ""));
            const pedido = {
                id: Date.now(),
                cliente: (localStorage.getItem('nombreCliente') || "CLIENTE").toUpperCase(),
                items: Object.values(carrito),
                total: total,
                fecha: new Date().toLocaleDateString(),
                hora: new Date().toLocaleTimeString()
            };

            try {
                const res = await API.savePedido(pedido);
                if (res.success) {
                    UI.showToast("Venta realizada", "success");
                    carrito = {};
                    UI.closeModal();
                    actualizarCarrito();
                    init(); 
                }
            } catch (e) { UI.showToast("Error en proceso", "error"); }
        }

        function reiniciarPedido() {
            if(!Object.keys(carrito).length) return;
            UI.confirm("VACIAR CARRITO", "¿Deseas eliminar todos los productos seleccionados?", () => {
                carrito = {};
                actualizarCarrito();
                render();
            });
        }

        function cerrarSesion() { localStorage.clear(); window.location.href = 'login.html'; }
        window.onload = init;
    </script>
</body>
</html>
}

        window.onload = init;
    </script>
</body>
</html>
