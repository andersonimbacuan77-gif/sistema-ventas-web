<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(localStorage.getItem('userRol') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISCONTED - Panel de Control</title>
    
    <link rel="stylesheet" href="global.css">
    <style>
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg);
        }

        .header-controls {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .category-filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .category-filters::-webkit-scrollbar { height: 4px; }
        .category-filters::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .view-toggle {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 4px;
        }

        .view-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .view-btn.active {
            background: var(--accent);
            color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
            position: relative;
        }

        .product-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: #1e293b;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 12px;
            cursor: zoom-in;
        }

        .product-info h3 { margin: 0; font-size: 0.95rem; color: white; }
        .product-info .ref { font-size: 0.7rem; color: var(--text-muted); font-family: monospace; }
        .product-info .stock { font-size: 0.75rem; font-weight: 700; margin: 8px 0; }
        .product-info .stock.low { color: var(--danger); }
        .product-info .price { font-size: 1.1rem; font-weight: 800; color: var(--success); }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        /* List View */
        .products-list { display: flex; flex-direction: column; gap: 10px; }
        .products-list .product-card {
            flex-direction: row;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
        }
        .products-list .product-image { width: 50px; height: 50px; margin-bottom: 0; }
        .products-list .product-info { flex: 1; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; align-items: center; }
        .products-list .product-actions { margin-top: 0; width: auto; }

        @media (max-width: 768px) {
            .main { padding: 15px; }
            .sidebar { width: 0; display: none; }
            .header-controls { padding: 15px; }
            .products-list .product-info { grid-template-columns: 1fr; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" onclick="UI.toggleSidebar()">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">📦</div>
            <div class="brand-name" id="brand-name">SISCONTED</div>
        </div>
        <nav>
            <button class="btn btn-primary" style="width:100%; margin-bottom: 20px;" onclick="abrirModalNuevo()">➕ NUEVO PRODUCTO</button>
            <a href="index.html" class="active">🏠 Inventario Local</a>
            <a href="inventario.html">📦 Inventario Global</a>
            <a href="admin.html">📊 Dashboard Ventas</a>
            <a href="reportes.html">📂 Reportes</a>
            <a href="config.html">⚙️ Configuración</a>
            <a href="#" onclick="cerrarSesion()" class="btn-logout" style="margin-top:20px; border:1px solid rgba(239,68,68,0.3); color:#f87171;">🚪 Salir</a>
        </nav>
    </div>

    <div class="main">
        <div class="header-controls">
            <div class="search-row">
                <div class="search-wrapper">
                    <i>🔍</i>
                    <input type="text" id="buscador" class="form-control" placeholder="Buscar por nombre o código..." onkeyup="render()">
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" id="btn-grid" onclick="cambiarVista('grid')">Grid</button>
                    <button class="view-btn" id="btn-list" onclick="cambiarVista('list')">Lista</button>
                </div>
            </div>
            <div id="filtros" class="category-filters"></div>
        </div>

        <div id="lista" class="products-grid"></div>
    </div>
    <div id="modal-form" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-titulo" style="font-family: 'Orbitron', sans-serif; color: var(--primary-light);">Registrar Producto</h2>
            </div>
            
            <div class="modal-body">
                <input type="hidden" id="edit-index">
                
                <label>Nombre del Producto</label>
                <input type="text" id="nombre" placeholder="Ej: Arroz 1kg">
            
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                        <label>Categoría</label>
                        <select id="categoria"></select>
                    </div>
                    <div>
                        <label>Medida</label>
                        <select id="unidad"></select>
                    </div>
                </div>
                
                <label>Referencia / Código de Barras</label>
                <input type="text" id="codigo" style="border-color: rgba(245, 158, 11, 0.3); color: var(--warning);">
                
                <label>Precio Compra ($)</label>
                <input type="number" id="precio-compra" oninput="calcularVentaDesdeMargen()">
                
                <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                        <label>% Ganancia</label>
                        <input type="number" id="margen" oninput="calcularVentaDesdeMargen()">
                    </div>
                    <div>
                        <label>Precio Venta ($)</label>
                        <input type="number" id="precio-venta" oninput="calcularMargenDesdeVenta()">
                    </div>
                </div>
                
                <div id="utilidad-tag" style="text-align: right; font-size: 0.85rem; color: var(--success); font-weight: 600; margin-bottom: 24px;">Utilidad: $0.00</div>
                
                <label>Imagen del Producto</label>
                <input type="file" id="foto" accept="image/*" style="font-size: 0.8rem; padding: 8px; width: 100%;">
                
                <button class="btn btn-primary" id="btn-main-save" onclick="guardar()" style="width: 100%; margin-top: 20px;">💾 GUARDAR PRODUCTO</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="ui-helpers.js"></script>
    <script>
        let productos = [];
        let editMode = false;
        let vistaActual = 'grid';
        let categoriaActual = 'Todas';

        async function init() {
            await aplicarConfig();
            await cargarProductos();
        }

        async function aplicarConfig() {
            try {
                const config = await API.getConfig();
                if (config?.empresa?.nombre) document.getElementById('brand-name').innerText = config.empresa.nombre;
                
                const catFilters = document.getElementById('filtros');
                catFilters.innerHTML = '<button class="filter-btn active" onclick="filtrarCat(\'Todas\', this)">Todas</button>';
                config.categorias?.forEach(c => {
                    catFilters.innerHTML += `<button class="filter-btn" onclick="filtrarCat('${c}', this)">${c}</button>`;
                });
            } catch (e) {}
        }

        async function cargarProductos() {
            try {
                productos = await API.getProductos();
                render();
            } catch (error) { UI.showToast("Error de conexión", "error"); }
        }

        function render() {
            const search = document.getElementById('buscador').value.toLowerCase();
            const filtrados = productos.filter(p => {
                const mB = (p.nombre || "").toLowerCase().includes(search) || (p.codigo || "").toLowerCase().includes(search);
                const mC = categoriaActual === 'Todas' || p.categoria === categoriaActual;
                return mB && mC;
            });

            const container = document.getElementById('lista');
            container.className = vistaActual === 'grid' ? 'products-grid' : 'products-list';
            
            container.innerHTML = filtrados.map((p, i) => {
                const idx = productos.indexOf(p);
                const stock = p.existencia || 0;
                const isLow = stock <= 5;
                const img = p.imagen || 'https://via.placeholder.com/150?text=📦';

                return `
                    <div class="product-card">
                        <img src="${img}" class="product-image" onclick="UI.showModal('${p.nombre}', '<img src=\\'${img}\\' style=\\'width:100%; border-radius:12px;\\'>')">
                        <div class="product-info">
                            <span class="badge" style="background:rgba(168,85,247,0.1); color:var(--accent); font-size:0.6rem; margin-bottom:5px;">${p.categoria || 'GENERAL'}</span>
                            <h3>${p.nombre.toUpperCase()}</h3>
                            <div class="ref">REF: ${p.codigo}</div>
                            <div class="stock ${isLow ? 'low' : ''}">Stock: ${stock} ${p.unidad || 'UND'}</div>
                            <div class="price">$ ${parseFloat(p.precio || 0).toLocaleString()}</div>
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-primary btn-sm" style="flex:1;" onclick="prepararEdicion(${idx})">✏️</button>
                            <button class="btn btn-danger btn-sm" onclick="eliminar(${idx})">🗑️</button>
                        </div>
                    </div>`;
            }).join('') || '<p style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">No hay productos.</p>';
        }

        function filtrarCat(cat, btn) {
            categoriaActual = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function cambiarVista(modo) {
            vistaActual = modo;
            document.getElementById('btn-grid').classList.toggle('active', modo === 'grid');
            document.getElementById('btn-list').classList.toggle('active', modo === 'list');
            render();
        }

        async function abrirModalNuevo() {
            const config = await API.getConfig();
            const categories = config.categorias || [];
            const units = config.unidades || [];

            const formHtml = `
                <div class="modal-form-content">
                    <label class="label-small">Nombre del Producto</label>
                    <input type="text" id="m-nombre" class="form-control" placeholder="Ej: Arroz 1kg" style="margin-bottom:15px;">
                    
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                        <div>
                            <label class="label-small">Categoría</label>
                            <select id="m-categoria" class="form-control">
                                <option value="General">General</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="label-small">Medida</label>
                            <select id="m-unidad" class="form-control">
                                <option value="UND">Unidades (UND)</option>
                                ${units.map(u => `<option value="${u}">${u}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <label class="label-small">Código / Referencia</label>
                    <input type="text" id="m-codigo" class="form-control" placeholder="Escanear o escribir..." style="margin-bottom:15px;">

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                        <div>
                            <label class="label-small">Precio Compra</label>
                            <input type="number" id="m-costo" class="form-control" oninput="recalc('costo')">
                        </div>
                        <div>
                            <label class="label-small">% Ganancia</label>
                            <input type="number" id="m-margen" class="form-control" oninput="recalc('margen')">
                        </div>
                    </div>

                    <label class="label-small">Precio Venta</label>
                    <input type="number" id="m-venta" class="form-control" oninput="recalc('venta')" style="margin-bottom:5px;">
                    <div id="m-utilidad" style="text-align:right; font-size:0.75rem; color:var(--success); margin-bottom:15px;">Utilidad: $ 0</div>

                    <label class="label-small">Imagen</label>
                    <input type="file" id="m-foto" class="form-control" accept="image/*" style="margin-bottom:20px;">

                    <button class="btn btn-primary" style="width:100%;" onclick="guardar()">💾 GUARDAR PRODUCTO</button>
                </div>
            `;
            UI.showModal("Registrar Producto", formHtml);
            editMode = false;
        }

        window.recalc = function(tipo) {
            const pc = parseFloat(document.getElementById('m-costo').value) || 0;
            const pm = parseFloat(document.getElementById('m-margen').value) || 0;
            const pv = parseFloat(document.getElementById('m-venta').value) || 0;

            if(tipo === 'costo' || tipo === 'margen') {
                const nv = pc + (pc * (pm/100));
                document.getElementById('m-venta').value = nv.toFixed(2);
            } else if(tipo === 'venta' && pc > 0) {
                const nm = ((pv - pc) / pc) * 100;
                document.getElementById('m-margen').value = nm.toFixed(1);
            }
            const util = (parseFloat(document.getElementById('m-venta').value) || 0) - pc;
            document.getElementById('m-utilidad').innerText = `Utilidad: $ ${util.toLocaleString()}`;
        }

        async function guardar() {
            const p = {
                nombre: document.getElementById('m-nombre').value.trim(),
                categoria: document.getElementById('m-categoria').value,
                unidad: document.getElementById('m-unidad').value,
                codigo: document.getElementById('m-codigo').value.trim(),
                precioCompra: parseFloat(document.getElementById('m-costo').value) || 0,
                precio: parseFloat(document.getElementById('m-venta').value) || 0,
                margen: document.getElementById('m-margen').value
            };

            if(!p.nombre || !p.codigo) return UI.showToast("Nombre y código obligatorios", "warning");

            const file = document.getElementById('m-foto').files[0];
            const executeSave = async (imgBase64) => {
                try {
                    if(imgBase64) p.imagen = imgBase64;
                    if(editMode) {
                        p._id = productos[editMode.index]._id;
                        p.existencia = productos[editMode.index].existencia;
                        if(!imgBase64) p.imagen = productos[editMode.index].imagen;
                    } else { p.existencia = 0; }

                    const res = await API.saveProducto(p);
                    if(res.success) {
                        UI.showToast("Producto guardado", "success");
                        UI.closeModal();
                        cargarProductos();
                    }
                } catch(e) { UI.showToast("Error al guardar", "error"); }
            };

            if(file) {
                const reader = new FileReader();
                reader.onload = () => executeSave(reader.result);
                reader.readAsDataURL(file);
            } else executeSave(null);
        }

        async function prepararEdicion(i) {
            await abrirModalNuevo();
            editMode = { index: i };
            const p = productos[i];
            document.getElementById('m-nombre').value = p.nombre;
            document.getElementById('m-categoria').value = p.categoria || "General";
            document.getElementById('m-unidad').value = p.unidad || "UND";
            document.getElementById('m-codigo').value = p.codigo;
            document.getElementById('m-costo').value = p.precioCompra;
            document.getElementById('m-venta').value = p.precio;
            document.getElementById('m-margen').value = p.margen || "";
            recalc('costo');
        }

        function eliminar(i) {
            UI.confirm("ELIMINAR", "¿Deseas borrar este producto?", async () => {
                try {
                    const id = productos[i]._id || productos[i].codigo;
                    if((await API.deleteProducto(id)).success) {
                        UI.showToast("Eliminado", "success");
                        cargarProductos();
                    }
                } catch(e) { UI.showToast("Error", "error"); }
            });
        }

        function cerrarSesion() { localStorage.clear(); window.location.href = 'login.html'; }
        window.onload = init;
    </script>
</body>
</html>
  await cargarProductos(); 
    };
</script>
</body>
</html>
