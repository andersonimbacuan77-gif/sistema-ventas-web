<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | Autenticación</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        // FASE 74: Sincronización Universal (Fix Definitivo)
        (async function() {
            const root = document.documentElement;
            const apply = (data) => {
                if(!data) return;
                Object.keys(data).forEach(k => root.style.setProperty(k, data[k]));
            };

            // 1. LocalStorage (Inmediato)
            const local = localStorage.getItem('app-theme-data');
            if (local) apply(JSON.parse(local));

            // 2. MongoDB via API (Anti-Cache)
            try {
                const ver = Date.now();
                // FASE 74 FIX: Leer de la API del servidor (MongoDB), no del archivo estático
                const r = await fetch('/api/data/config.json?v=' + ver);
                const config = await r.json();
                
                if (config && config.theme && config.theme.data) {
                    apply(config.theme.data);
                    localStorage.setItem('app-theme-key', config.theme.key);
                    localStorage.setItem('app-theme-data', JSON.stringify(config.theme.data));
                }
                
                // Actualizar branding
                if (config.company && config.company.name) {
                    const brandEl = document.querySelector('.brand-name');
                    if(brandEl) brandEl.textContent = config.company.name;
                }
            } catch(e) {}
        })();
    </script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-black: #000000;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
            --accent: #38bdf8;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-black);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* FONDO GALAXIA ANIMADO (NEGRO PURO) */
        #stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-black);
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from { transform: translateY(0); }
            to { transform: translateY(-110vh); }
        }

        /* AUTH CARD - REDISEÑO PROFESIONAL */
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px;
            width: 95%;
            max-width: 550px; /* Un poco más ancho para el registro */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 1), 0 0 40px rgba(59, 130, 246, 0.1);
            text-align: center;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Scrollbar personalizado para la card */
        .auth-card::-webkit-scrollbar { width: 6px; }
        .auth-card::-webkit-scrollbar-track { background: transparent; }
        .auth-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); scale: 0.95; }
            to { opacity: 1; transform: translateY(0); scale: 1; }
        }

        /* LOGO ONDAS EN LOGIN - FORZADO AZUL-VERDE */
        .wave-text {
            font-family: 'Montserrat', sans-serif !important;
            font-size: 3.2rem !important;
            font-weight: 900 !important;
            letter-spacing: -1.5px !important;
            margin-bottom: 10px !important;
        }
        .wave-text span {
            display: inline-block;
            animation: wave 2.5s ease-in-out infinite;
            animation-delay: calc(0.1s * var(--i));
            background: var(--primary-gradient) !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3) !important;
        }
        @keyframes wave {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        #auth-subtitle {
            color: #94a3b8;
            font-size: 1.05rem;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* INPUTS Y BOTONES */
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; font-weight: 500; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 14px 18px 14px 42px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: scale(1.01);
        }

        .btn-primary-auth {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px -5px var(--primary-glow);
            margin-top: 15px;
        }

        .btn-primary-auth:hover {
            transform: translateY(-4px);
            filter: brightness(1.15);
            box-shadow: 0 20px 35px -5px var(--primary-glow);
        }

        .auth-switch { margin-top: 30px; font-size: 0.95rem; color: #64748b; }
        .auth-switch a { color: var(--accent); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .auth-switch a:hover { color: white; text-shadow: 0 0 10px var(--accent); }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .row { flex-direction: column; gap: 0; }
            .wave-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div id="stars-container"></div>

    <div class="auth-card">
        <div class="auth-header">
            <h1 id="dynamic-branding" class="wave-text"></h1>
            <p id="auth-subtitle">Ingresa para ver el catálogo</p>
        </div>
        
        <!-- FORMULARIO DE LOGIN -->
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label>Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" required placeholder="Tu usuario">
                </div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-primary-auth">Iniciar Sesión Ahora</button>
            <p class="auth-switch">¿Eres nuevo aquí? <a href="#" id="go-to-register">Crea una cuenta</a></p>
        </form>

        <!-- FORMULARIO DE REGISTRO COMPLETO (RESTAURADO) -->
        <form id="register-form" class="auth-form" style="display: none; flex-direction: column;">
            <div class="row">
                <div class="form-group col">
                    <label>Nombre Completo</label>
                    <div class="input-wrapper"><i class="fas fa-id-badge"></i><input type="text" name="name" required placeholder="Nombre"></div>
                </div>
                <div class="form-group col">
                    <label>Documento / NIT</label>
                    <div class="input-wrapper"><i class="fas fa-fingerprint"></i><input type="text" name="nit" required placeholder="NIT"></div>
                </div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label>Departamento</label>
                    <div class="input-wrapper"><i class="fas fa-map"></i><input type="text" name="department" required placeholder="Depto"></div>
                </div>
                <div class="form-group col">
                    <label>Municipio / Ciudad</label>
                    <div class="input-wrapper"><i class="fas fa-city"></i><input type="text" name="city" required placeholder="Ciudad"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Dirección de Envío</label>
                <div class="input-wrapper"><i class="fas fa-home"></i><input type="text" name="address" required placeholder="Calle 123..."></div>
            </div>

            <div class="form-group">
                <label>Teléfono de Contacto</label>
                <div class="input-wrapper"><i class="fas fa-phone"></i><input type="tel" name="phone" required placeholder="310..."></div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label>Nuevo Usuario</label>
                    <div class="input-wrapper"><i class="fas fa-user-plus"></i><input type="text" name="username" required placeholder="Usuario"></div>
                </div>
                <div class="form-group col">
                    <label>Contraseña</label>
                    <div class="input-wrapper"><i class="fas fa-key"></i><input type="password" name="password" required placeholder="••••"></div>
                </div>
            </div>

            <button type="submit" class="btn-primary-auth">Registrarme Gratis</button>
            <p class="auth-switch">¿Ya tienes cuenta? <a href="#" id="go-to-login">Inicia Sesión</a></p>
        </form>
    </div>

    <script>
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 180; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2.5 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 40 + 40) + 's';
            star.style.animationDelay = (Math.random() * -100) + 's';
            container.appendChild(star);
        }
    </script>
    <script src="api-adapter.js"></script>
    <script src="login.js"></script>
</body>
</html>
