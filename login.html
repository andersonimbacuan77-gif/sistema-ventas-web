<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        // Forzar cierre de sesión real y completo al entrar a la pantalla de login
        localStorage.removeItem('userLogin');
        localStorage.removeItem('userRol');
        localStorage.removeItem('adminLogueado');
        localStorage.removeItem('nombreCliente');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISCONTED - Acceso Profesional</title>
    
    <link rel="stylesheet" href="global.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010103; color: white; font-family: 'Inter', sans-serif; }
        #canvas-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }

        .system-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: 15px;
            display: flex;
            gap: 5px;
            text-align: center;
            flex-wrap: wrap;
            justify-content: center;
            text-transform: uppercase;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        .letter { 
            display: inline-block; 
            position: relative; 
            transform: translateY(-100vh) rotate(360deg) scale(0); 
            opacity: 0; 
            animation: dropSwirl 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
            background: linear-gradient(180deg, #fff 0%, var(--accent) 100%); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }

        @keyframes dropSwirl { 
            0% { transform: translateY(-100vh) rotate(720deg) scale(0.1); opacity: 0; } 
            100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; } 
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            max-width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out forwards 1.2s;
            opacity: 0;
        }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .footer-login { 
            position: fixed; 
            bottom: 20px; 
            text-align: center; 
            width: 100%; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            z-index: 10;
        }

        @media (max-width: 768px) {
            .system-title { font-size: 2.5rem; letter-spacing: 8px; }
            .login-card { padding: 30px; }
        }
    </style>
</head>
<body>
    <canvas id="canvas-stars"></canvas>

    <div class="container">
        <div class="system-title" id="title-anim"></div>

        <div id="vista-login" class="login-card">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="user-login" placeholder="Ingrese su usuario" class="form-control">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="pass-login" placeholder="••••••••" class="form-control">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="login()">INICIAR SESIÓN</button>
            <div style="margin-top: 25px; text-align: center;">
                <a href="#" class="link-small" onclick="UI.showToast('Contacte al administrador para registro', 'info')">¿No tiene cuenta? Regístrese aquí</a>
            </div>
        </div>
    </div>

    <div class="footer-login">
        &copy; 2026 SISCONTED | Desarrollado por <b>Eduar Anderson Imbacuán</b><br>
        <a href="https://wa.me/573182744758" target="_blank" style="color:var(--success); text-decoration:none;">Soporte Técnico: 3182744758</a>
    </div>

    <script src="api.js"></script>
    <script src="ui-helpers.js"></script>
    <script>
        // --- ANIMACIÓN TÍTULO ---
        const titleContainer = document.getElementById('title-anim');
        const titleText = "SISCONTED";
        titleText.split('').forEach((l, i) => {
            const span = document.createElement('span');
            span.textContent = l;
            span.setAttribute('data-letter', l);
            span.className = 'letter';
            if (i >= 3) span.style.color = 'var(--primary-light)';
            span.style.animationDelay = `${i * 0.1}s, ${i * 0.2}s`; 
            titleContainer.appendChild(span);
        });

        // --- STARS ---
        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.2, speed: Math.random() * 0.05, opacity: Math.random() });
            }
        }
        function animateStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#010103"; ctx.fillRect(0,0,canvas.width,canvas.height);
            stars.forEach(s => {
                ctx.globalAlpha = s.opacity; ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars); initStars(); animateStars();

        function mostrarRegistro() {
            document.getElementById('vista-login').classList.add('hidden');
            document.getElementById('vista-registro').classList.remove('hidden');
        }
        function mostrarLogin() {
            document.getElementById('vista-registro').classList.add('hidden');
            document.getElementById('vista-login').classList.remove('hidden');
        }

        async function login() {
            const u = document.getElementById('user-login').value.trim();
            const p = document.getElementById('pass-login').value.trim();
            if(!u || !p) return UI.showToast("Ingrese credenciales", "warning");
            
            try {
                const res = await API.login(u, p);
                if (res.success) {
                    const c = res.user;
                    localStorage.setItem('nombreCliente', c.nombre);
                    localStorage.setItem('userLogin', c.user);
                    localStorage.setItem('userRol', c.rol);
                    localStorage.setItem('canEditPrice', c.canEditPrice);
                    localStorage.setItem('permExcel', c.permExcel);
                    localStorage.setItem('permPrint', c.permPrint);
                    localStorage.setItem('permTicket', c.permTicket);
                    localStorage.setItem('permWA', c.permWA);
                    
                    if (c.rol === 'admin') {
                        localStorage.setItem('adminLogueado', c.nombre); 
                        window.location.href = 'index.html';
                    } else { 
                        window.location.href = 'cliente.html'; 
                    }
                } else { UI.showToast("Usuario o clave incorrectos", "error"); }
            } catch (e) { UI.showToast("Error de conexión", "error"); }
        }

        async function registrarYEntrar() {
            UI.showToast("Registro próximamente disponible. Use admin/admin.", "info");
        }
    </script>
</body>
</html>
