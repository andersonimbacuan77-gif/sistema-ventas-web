<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if(localStorage.getItem('userRol') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Reportes - SISCONTED</title>
    <script src="api.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #a855f7; 
            --accent-glow: rgba(168, 85, 247, 0.4);
            --success: #10b981; 
            --profit: #10b981; 
            --danger: #ef4444; 
            --bg: #05060f;
            --card-bg: rgba(31, 41, 55, 0.5);
            --text-main: #f3f4f6;
            --text-muted: #94a3b8;
            --info: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            color: var(--text-main); 
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header { 
            background: rgba(17, 24, 39, 0.8); 
            backdrop-filter: blur(20px);
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin: 0;
        }

        .container { padding: 40px; max-width: 1200px; margin: auto; }

        .filter-grid {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            align-items: center;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 700; 
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input { 
            padding: 12px 15px; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: white; 
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .resumen-global-container {
            display: flex;
            gap: 20px;
            grid-column: span 2;
        }

        .resumen-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            transition: 0.3s;
        }
        .resumen-box:hover { border-color: var(--primary); transform: translateY(-3px); }
        .box-ventas { border-bottom: 3px solid var(--info); }
        .box-ganancias { border-bottom: 3px solid var(--profit); }

        .resumen-box small { 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            display: block; 
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .resumen-box h2 { 
            margin: 0; 
            font-size: 1.6rem; 
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .report-card {
            background: var(--card-bg);
            margin-bottom: 15px;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .report-card:hover { 
            transform: translateX(10px); 
            border-color: var(--accent);
            background: rgba(45, 55, 75, 0.6);
        }

        .btn { 
            border: none; 
            padding: 12px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-view { background: var(--info); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-del:hover { background: var(--danger); color: white; }
        .btn-back { 
            background: rgba(255, 255, 255, 0.05); 
            color: #cbd5e1; 
            padding: 10px 18px; 
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }
        .btn-back:hover { background: var(--border); color: white; transform: translateX(-5px); }

        .tag { 
            padding: 4px 10px; 
            border-radius: 8px; 
            font-size: 0.7rem; 
            background: rgba(168, 85, 247, 0.1); 
            color: var(--accent); 
            border: 1px solid var(--accent); 
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        #modal-detalle {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: var(--bg); 
            padding: 40px; 
            border-radius: 30px;
            width: 90%; 
            max-width: 900px; 
            max-height: 85vh; 
            overflow-y: auto;
            border: 1px solid var(--border); 
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .close-modal { 
            position: absolute; 
            top: 20px; right: 25px; 
            cursor: pointer; 
            font-size: 2.5rem; 
            color: var(--danger); 
            transition: 0.3s;
        }
        .close-modal:hover { transform: rotate(90deg); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.95rem; }
        th { 
            background: rgba(255, 255, 255, 0.03); 
            color: var(--accent); 
            padding: 15px 20px; 
            text-align: left; 
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); }

        .m-dato { 
            background: rgba(0, 0, 0, 0.3); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
        }
        .m-dato label { 
            display: block; 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .m-dato span { font-size: 1.4rem; font-weight: 800; font-family: 'Orbitron', sans-serif; }
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-glow); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
            .main { padding: 20px; overflow-y: visible; }
            .grid { grid-template-columns: 1fr; }
            .modal-content { width: 95%; padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 1.5rem;">📊</span>
        <h1 style="margin:0; font-size: 1.2rem;">REPORTES E HISTORIAL</h1>
    </div>
    <button onclick="window.location.href='admin.html'" class="btn btn-back">🔙 Volver al Panel</button>
</header>

<div class="container">
    <div class="filter-grid">
        <div class="filter-group">
            <label>DESDE</label>
            <input type="date" id="f-inicio" onchange="cargarHistorial()">
        </div>
        <div class="filter-group">
            <label>HASTA</label>
            <input type="date" id="f-fin" onchange="cargarHistorial()">
        </div>
        <div class="filter-group">
            <label>ADMINISTRADOR</label>
            <input type="text" id="f-admin" placeholder="Buscar por admin..." onkeyup="cargarHistorial()">
        </div>
        <div class="resumen-global-container">
            <div class="resumen-box box-ventas">
                <small>Venta Acumulada</small>
                <h2 id="total-v-filtro" style="color: var(--info);">$ 0</h2>
            </div>
            <div class="resumen-box box-ganancias">
                <small>Ganancia Acumulada</small>
                <h2 id="total-g-filtro" style="color: var(--profit);">$ 0</h2>
            </div>
        </div>
        <div style="display: flex; gap: 10px; width: 100%; grid-column: span 1;">
            <button class="btn btn-view" onclick="exportarResumenExcel()" style="padding:15px; background:#1D6F42; color:white; font-family:'Orbitron', sans-serif; border:none; border-radius:12px; cursor:pointer; flex: 1; font-size: 0.75rem; justify-content:center;">📊 RESUMEN GENERAL</button>
            <button class="btn btn-view" onclick="exportarResumenFiltrado()" style="padding:15px; background:#0ea5e9; color:white; font-family:'Orbitron', sans-serif; border:none; border-radius:12px; cursor:pointer; flex: 1; font-size: 0.75rem; justify-content:center;">📊 EXPORTAR FILTRADOS</button>
        </div>
    </div>

    <div id="lista-reportes"></div>
</div>

<div id="modal-detalle">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <h2 id="modal-titulo" style="color: var(--accent); margin-top: 0;">Detalle</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;">
            <div class="m-dato"><label>Total Venta</label><span id="md-venta" style="color: var(--info);"></span></div>
            <div class="m-dato"><label>Total Ganancia</label><span id="md-ganancia" style="color: var(--profit);"></span></div>
            <div class="m-dato"><label>Admin</label><span id="md-admin" style="font-size: 0.8rem;"></span></div>
            <div class="m-dato"><label>Pedidos</label><span id="md-cant" style="font-size: 1rem;"></span></div>
            <div class="m-dato" style="grid-column: span 1; display:flex; align-items:center;">
                <button class="btn btn-view" onclick="exportarReporteActualExcel()" style="background:#1D6F42; color:white; border:none; width:100%; height:100%; font-size:0.7rem;">📊 EXCEL</button>
            </div>
        </div>
        
        <div id="modal-tabla-container"></div>
    </div>
</div>

<div id="modal-detalle-pedido" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter:blur(10px);">
    <div class="modal-content" style="width: 80%; max-width: 600px;">
        <span class="close-modal" onclick="cerrarPedidoModal()">&times;</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="ped-modal-titulo" style="color: var(--accent); margin:0;">Detalles del Pedido</h3>
            <button id="btn-export-pedido" class="btn btn-view" style="background:#1D6F42; color:white; font-size:0.7rem;">📊 Exportar Pedido</button>
        </div>
        <div id="ped-modal-tabla"></div>
    </div>
</div>


    <script>
        let historialGlobal = [];
        let productosDB = [];

        async function cargarHistorial() {
            try {
                const config = await API.getConfig();
                if(config.empresa && config.empresa.tema) {
                    API.applyTheme(config.empresa.tema);
                }
                historialGlobal = await API.getReportes();
                productosDB = await API.getProductos();
                const fIn = document.getElementById('f-inicio').value;
                const fFi = document.getElementById('f-fin').value;
                const fAdmin = document.getElementById('f-admin').value.toLowerCase();
                
                let html = "";
                let sumaVentasTotal = 0;
                let sumaGananciasTotal = 0;

                const filtrados = [...historialGlobal].reverse().filter(rep => {
                    const fRepo = API.getFechaLocal(Number(rep.idReporte));
                    const coincideFecha = (!fIn || fRepo >= fIn) && (!fFi || fRepo <= fFi);
                    const coincideAdmin = !fAdmin || (rep.admin && rep.admin.toLowerCase().includes(fAdmin));
                    return coincideFecha && coincideAdmin;
                });

                filtrados.forEach(rep => {
                    // Si faltan los valores raw, intentamos obtenerlos del texto formateado o poner 0
                    const vCorregido = parseFloat(rep.ventasRaw) || 
                                     (rep.totalVentas ? parseFloat(rep.totalVentas.replace(/[^0-9.-]+/g,"")) : 0);
                    const gCorregido = parseFloat(rep.gananciaRaw) || 
                                     (rep.totalUtilidad ? parseFloat(rep.totalUtilidad.replace(/[^0-9.-]+/g,"")) : 0);

                    sumaVentasTotal += vCorregido;
                    sumaGananciasTotal += gCorregido;

                    html += `
                    <div class="report-card">
                        <div style="flex: 1;">
                            <span class="tag">ID: ${rep.idReporte}</span>
                            <h3 style="margin: 8px 0 4px 0;">${rep.rango.desde} al ${rep.rango.hasta}</h3>
                            <small style="color: #94a3b8;">Admin: ${rep.admin} | ${rep.fechaCreacion}</small>
                        </div>
                        <div style="text-align: right; margin-right: 25px;">
                            <div style="color: var(--info); font-weight: bold;">Venta: $${vCorregido.toLocaleString()}</div>
                            <div style="color: var(--profit); font-weight: bold;">Ganancia: $${gCorregido.toLocaleString()}</div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-view" onclick="verDetalleReporte(${rep.idReporte})">👁️ Detalle</button>
                            <button class="btn btn-del" onclick="eliminarReporte(${rep.idReporte})">🗑️</button>
                        </div>
                    </div>`;
                });

                document.getElementById('lista-reportes').innerHTML = html || "<p align='center'>No hay resultados.</p>";
                document.getElementById('total-v-filtro').innerText = `$ ${sumaVentasTotal.toLocaleString()}`;
                document.getElementById('total-g-filtro').innerText = `$ ${sumaGananciasTotal.toLocaleString()}`;

            } catch (e) { 
                console.error(e);
                document.getElementById('lista-reportes').innerHTML = "<p align='center'>Error al cargar el historial.</p>";
            }
        }

        function verDetalleReporte(id) {
            const rep = historialGlobal.find(r => r.idReporte === id);
            if (!rep) return;

            const vModal = parseFloat(rep.ventasRaw) || 0;
            const gModal = parseFloat(rep.gananciaRaw) || 0;

            document.getElementById('modal-titulo').innerText = `Reporte de Ventas #${rep.idReporte}`;
            document.getElementById('md-venta').innerText = `$ ${vModal.toLocaleString()}`;
            document.getElementById('md-ganancia').innerText = `$ ${gModal.toLocaleString()}`;
            document.getElementById('md-admin').innerText = rep.admin;
            document.getElementById('md-cant').innerText = rep.cantidadPedidos;

            let tablaHtml = `<table><thead><tr><th>Fecha / Hora</th><th>Cliente</th><th>Total</th><th style="color:var(--profit)">Ganancia</th><th style="text-align:center">Ver</th></tr></thead><tbody>`;
            rep.pedidos.forEach(p => {
                const totalPedido = parseFloat(p.total) || 0;
                const ganPedido = parseFloat(p.ganancia) || 0;
                tablaHtml += `<tr>
                    <td>${p.fecha} ${p.hora}</td>
                    <td><b>${p.cliente}</b></td>
                    <td style="color:var(--info); font-weight:bold;">$${totalPedido.toLocaleString()}</td>
                    <td style="color:var(--profit);">$${ganPedido.toLocaleString()}</td>
                    <td align="center">
                        <button class="btn btn-view" style="padding:5px 10px; font-size:0.7rem;" onclick="verPedidoDelReporte(${id}, ${p.id})">👁️</button>
                    </td>
                </tr>`;
            });
            tablaHtml += `</tbody></table>`;
            
            document.getElementById('modal-tabla-container').innerHTML = tablaHtml;
            document.getElementById('modal-detalle').style.display = 'flex';
        }

        function verPedidoDelReporte(idReporte, idPedido) {
            const rep = historialGlobal.find(r => r.idReporte === idReporte);
            if(!rep) return;
            const p = rep.pedidos.find(x => x.id == idPedido);
            if(!p) return;

            document.getElementById('ped-modal-titulo').innerText = `Pedido de ${p.cliente} (${p.id})`;
            
            let html = '<table style="width:100%; border-collapse:collapse; color:white;"><thead><tr><th style="padding:10px; text-align:left; border-bottom:1px solid #334155;">Producto</th><th style="padding:10px; text-align:center; border-bottom:1px solid #334155;">Cant.</th><th style="padding:10px; text-align:right; border-bottom:1px solid #334155;">Precio Unit.</th><th style="padding:10px; text-align:right; border-bottom:1px solid #334155;">Subtotal</th><th style="padding:10px; text-align:right; border-bottom:1px solid #334155; color:var(--profit)">Ganancia</th></tr></thead><tbody>';
            
            p.items.forEach(i => {
                let gUnit = parseFloat(i.gananciaUnit);
                let gTotal = parseFloat(i.gananciaTotal);

                // Fallback para reportes viejos
                if (isNaN(gUnit)) {
                    const pDB = productosDB.find(prod => prod.codigo === (i.referencia || i.codigo));
                    const pCompra = pDB ? parseFloat(pDB.precioCompra || 0) : 0;
                    gUnit = parseFloat(i.precio) - pCompra;
                    gTotal = gUnit * parseInt(i.cantidad);
                }

                const subtotal = parseFloat(i.precio) * parseInt(i.cantidad);
                html += `<tr>
                    <td style="padding:10px; border-bottom:1px solid #1e293b;">${i.nombre}<br><small style="color:#94a3b8">Util. Unit: $${gUnit.toLocaleString()}</small></td>
                    <td align="center" style="padding:10px; border-bottom:1px solid #1e293b;">${i.cantidad}</td>
                    <td align="right" style="padding:10px; border-bottom:1px solid #1e293b;">$${parseFloat(i.precio).toLocaleString()}</td>
                    <td align="right" style="padding:10px; border-bottom:1px solid #1e293b; color:var(--info)">$${subtotal.toLocaleString()}</td>
                    <td align="right" style="padding:10px; border-bottom:1px solid #1e293b; color:var(--profit)">$${gTotal.toLocaleString()}</td>
                </tr>`;
            });
            
            const ganFinal = parseFloat(p.ganancia) || 0;
            html += `</tbody><tfoot>
                <tr><td colspan="4" align="right" style="padding:5px 15px; font-weight:600; color:#94a3b8;">GANANCIA PEDIDO:</td><td align="right" style="padding:5px 15px; font-weight:800; color:var(--profit);">$${ganFinal.toLocaleString()}</td></tr>
                <tr><td colspan="4" align="right" style="padding:5px 15px; font-weight:800; border-top:1px solid #334155;">TOTAL VENTA:</td><td align="right" style="padding:5px 15px; font-weight:800; color:var(--success); border-top:1px solid #334155;">$${parseFloat(p.total).toLocaleString()}</td></tr>
            </tfoot></table>`;
            
            document.getElementById('ped-modal-tabla').innerHTML = html;
            document.getElementById('btn-export-pedido').onclick = () => exportarPedidoIndividualExcel(p);
            document.getElementById('modal-detalle-pedido').style.display = 'flex';
        }

        async function obtenerHeaderEmpresa(cols) {
            let emp = { nombre: 'MI EMPRESA', nit: '', direccion: '', telefono: '', logoBase64: '' };
            try {
                const config = await API.getConfig();
                if (config && config.empresa) emp = { ...emp, ...config.empresa };
            } catch(e) {}
            
            let logoHtml = '';
            if (emp.logoBase64) {
                // Usamos cid:logo para que MHT lo reconozca
                // Reducimos tamaño para que encuadre perfectamente en 3 filas
                logoHtml = `<th rowspan="3" width="80" style="text-align:center; vertical-align:middle; background:white; border:1px solid #ccc; height:60px;"><img src="cid:logo" width="60" height="60" style="display:block; margin:auto;"></th>`;
                cols--;
            }

            const headerHtml = `
                <tr height="20">${logoHtml}<th colspan="${cols}" style="text-align:center; font-size:16px; height:20px;">${emp.nombre.toUpperCase()}</th></tr>
                <tr height="20"><th colspan="${cols}" style="text-align:center; font-size:12px; height:20px;">NIT: ${emp.nit} | TEL: ${emp.telefono}</th></tr>
                <tr height="20"><th colspan="${cols}" style="text-align:center; font-size:11px; border-bottom:2px solid #333; height:20px;">${emp.direccion}</th></tr>
            `;

            return { headerHtml, logoBase64: emp.logoBase64 };
        }

        async function exportarResumenExcel() {
            if(historialGlobal.length === 0) return alert("No hay historial");
            
            const fIn = document.getElementById('f-inicio').value;
            const fFi = document.getElementById('f-fin').value;
            const { headerHtml, logoBase64 } = await obtenerHeaderEmpresa(6);

            let htmlResumen = `<table border="1">
                ${headerHtml}
                <tr><th colspan="6" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">RESUMEN HISTÓRICO DE REPORTES</th></tr>
                <tr><th colspan="6" style="background:#f8fafc; color:#334155; height:25px;">Periodo consultado: del ${fIn} al ${fFi}</th></tr>
                <tr>
                    <th style="background:#1e293b; color:white;">ID REPORTE</th><th style="background:#1e293b; color:white;">FECHA GENERADO</th><th style="background:#1e293b; color:white;">PERIODO</th><th style="background:#1e293b; color:white;">ADMIN</th><th style="background:#1e293b; color:white;">VENTA TOTAL</th><th style="background:#1e293b; color:white;">GANANCIA NETA</th>
                </tr>`;
            
            let totalVentaG = 0;
            let totalGananciaG = 0;

            historialGlobal.forEach(r => {
                const v = parseFloat(r.ventasRaw) || 0;
                const g = parseFloat(r.gananciaRaw) || 0;
                totalVentaG += v;
                totalGananciaG += g;

                htmlResumen += `<tr style="height:20px;">
                    <td>'${r.idReporte}</td>
                    <td>${r.fechaCreacion}</td>
                    <td>${r.rango.desde} a ${r.rango.hasta}</td>
                    <td>${r.admin}</td>
                    <td align="right">$ ${v.toLocaleString()}</td>
                    <td align="right">$ ${g.toLocaleString()}</td>
                </tr>`;
            });
            
            htmlResumen += `<tr style="font-weight:bold; height:20px;">
                <td colspan="4" align="right" style="background:#f1f5f9;">TOTALES GENERALES:</td>
                <td align="right" style="background:#f1f5f9;">$ ${totalVentaG.toLocaleString()}</td>
                <td align="right" style="background:#f1f5f9;">$ ${totalGananciaG.toLocaleString()}</td>
            </tr></table>`;
            
            API.descargarExcelMHT(htmlResumen, `Resumen_Historial_${API.getFechaLocal()}`, logoBase64);
        }

        async function exportarResumenFiltrado() {
            if(historialGlobal.length === 0) return alert("No hay historial disponible.");
            
            const fIn = document.getElementById('f-inicio').value;
            const fFi = document.getElementById('f-fin').value;
            const fAdmin = document.getElementById('f-admin').value.toLowerCase();

            const filtrados = [...historialGlobal].reverse().filter(rep => {
                const r = rep.rango || { desde: '', hasta: '' };
                const coincideFecha = (!fIn || r.desde >= fIn) && (!fFi || r.hasta <= fFi);
                const coincideAdmin = !fAdmin || (rep.admin && rep.admin.toLowerCase().includes(fAdmin));
                return coincideFecha && coincideAdmin;
            });

            if(filtrados.length === 0) return alert("No hay reportes que coincidan con los filtros.");

            const { headerHtml, logoBase64 } = await obtenerHeaderEmpresa(6);

            let htmlResumen = `<table border="1">
                ${headerHtml}
                <tr><th colspan="6" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">RESUMEN FILTRADO DE REPORTES</th></tr>
                <tr><th colspan="6" style="background:#f8fafc; color:#334155; height:25px;">Filtros: Desde ${fIn || 'General'} al ${fFi || 'General'} | Admin: ${fAdmin || 'Todos'}</th></tr>
                <tr>
                    <th style="background:#1e293b; color:white;">ID REPORTE</th><th style="background:#1e293b; color:white;">FECHA GENERADO</th><th style="background:#1e293b; color:white;">PERIODO</th><th style="background:#1e293b; color:white;">ADMIN</th><th style="background:#1e293b; color:white;">VENTA TOTAL</th><th style="background:#1e293b; color:white;">GANANCIA NETA</th>
                </tr>`;
            
            let totalVentaF = 0;
            let totalGananciaF = 0;

            filtrados.forEach(r => {
                const v = parseFloat(r.ventasRaw) || 0;
                const g = parseFloat(r.gananciaRaw) || 0;
                totalVentaF += v;
                totalGananciaF += g;

                htmlResumen += `<tr style="height:20px;">
                    <td>'${r.idReporte}</td>
                    <td>${r.fechaCreacion}</td>
                    <td>${r.rango.desde} a ${r.rango.hasta}</td>
                    <td>${r.admin}</td>
                    <td align="right">$ ${v.toLocaleString()}</td>
                    <td align="right">$ ${g.toLocaleString()}</td>
                </tr>`;
            });
            
            htmlResumen += `<tr style="font-weight:bold; height:20px;">
                <td colspan="4" align="right" style="background:#f1f5f9;">TOTALES FILTRADOS:</td>
                <td align="right" style="background:#f1f5f9;">$ ${totalVentaF.toLocaleString()}</td>
                <td align="right" style="background:#f1f5f9;">$ ${totalGananciaF.toLocaleString()}</td>
            </tr></table>`;
            
            API.descargarExcelMHT(htmlResumen, `Resumen_Filtrado_${API.getFechaLocal()}`, logoBase64);
        }

        async function exportarReporteActualExcel() {
            const idText = document.getElementById('modal-titulo').innerText.split('#')[1];
            const id = parseInt(idText);
            const rep = historialGlobal.find(r => r.idReporte === id);
            if(!rep) return;

            const { headerHtml, logoBase64 } = await obtenerHeaderEmpresa(5);
            let htmlReporte = `<table border="1">
                ${headerHtml}
                <tr><th colspan="5" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">DETALLE DE REPORTE #${rep.idReporte}</th></tr>
                <tr><th colspan="5" style="background:#f8fafc; color:#334155;">Periodo: ${rep.rango.desde} a ${rep.rango.hasta} | Admin: ${rep.admin}</th></tr>
                <tr>
                    <th style="background:#1e293b; color:white;">FECHA/HORA</th><th style="background:#1e293b; color:white;">CLIENTE</th><th style="background:#1e293b; color:white;">ID PEDIDO</th><th style="background:#1e293b; color:white;">TOTAL VENTA</th><th style="background:#1e293b; color:white;">GANANCIA</th>
                </tr>`;
            
            rep.pedidos.forEach(p => {
                htmlReporte += `<tr>
                    <td>${p.fecha} ${p.hora}</td>
                    <td>${p.cliente}</td>
                    <td>'${p.id}</td>
                    <td align="right">$ ${parseFloat(p.total).toLocaleString()}</td>
                    <td align="right">$ ${parseFloat(p.ganancia).toLocaleString()}</td>
                </tr>`;
            });

            htmlReporte += `<tr style="font-weight:bold;">
                <td colspan="3" align="right" style="background:#f1f5f9;">TOTALES:</td>
                <td align="right" style="background:#f1f5f9;">$ ${parseFloat(rep.ventasRaw).toLocaleString()}</td>
                <td align="right" style="background:#f1f5f9;">$ ${parseFloat(rep.gananciaRaw).toLocaleString()}</td>
            </tr></table>`;
            API.descargarExcelMHT(htmlReporte, `Detalle_Reporte_${rep.idReporte}`, logoBase64);
        }

        async function exportarPedidoIndividualExcel(p) {
            const { headerHtml, logoBase64 } = await obtenerHeaderEmpresa(7);
            
            let htmlPedido = `<table border="1">
                ${headerHtml}
                <tr><th colspan="7" style="background:#0f172a; color:#00f2ff; height:40px; font-size:18px;">COMPROBANTE DE PEDIDO #${p.id} (COPIA)</th></tr>
                <tr><th colspan="7" style="background:#f8fafc; color:#334155;">Cliente: ${p.cliente} | Fecha: ${p.fecha} ${p.hora}</th></tr>
                <tr>
                    <th style="background:#1e293b; color:white;">REF</th><th style="background:#1e293b; color:white;">PRODUCTO</th><th style="background:#1e293b; color:white;">UND</th><th style="background:#1e293b; color:white;">CANTIDAD</th><th style="background:#1e293b; color:white;">PRECIO UNIT</th><th style="background:#1e293b; color:white;">SUBTOTAL</th><th style="background:#1e293b; color:white;">GANANCIA TOTAL</th>
                </tr>`;

            p.items.forEach(i => {
                let gUnit = parseFloat(i.gananciaUnit);
                let gTotal = parseFloat(i.gananciaTotal);

                // Fallback para reportes viejos en Excel
                if (isNaN(gUnit)) {
                    const pDB = productosDB.find(prod => prod.codigo === (i.referencia || i.codigo));
                    const pCompra = pDB ? parseFloat(pDB.precioCompra || 0) : 0;
                    gUnit = parseFloat(i.precio) - pCompra;
                    gTotal = gUnit * parseInt(i.cantidad);
                }

                const subtotal = parseFloat(i.precio) * parseInt(i.cantidad);
                htmlPedido += `<tr>
                    <td>'${i.referencia || i.codigo}</td>
                    <td>${i.nombre}</td>
                    <td align="center">${i.unidad || 'Und'}</td>
                    <td align="center">${i.cantidad}</td>
                    <td align="right">$ ${parseFloat(i.precio).toLocaleString()}</td>
                    <td align="right">$ ${subtotal.toLocaleString()}</td>
                    <td align="right">$ ${gTotal.toLocaleString()}</td>
                </tr>`;
            });

            htmlPedido += `<tr style="font-weight:bold;">
                <td colspan="6" align="right" style="background:#f1f5f9;">GANANCIA TOTAL PEDIDO:</td>
                <td align="right" style="background:#f1f5f9;">$ ${parseFloat(p.ganancia).toLocaleString()}</td>
            </tr>
            <tr style="font-weight:bold;">
                <td colspan="6" align="right" style="background:#f1f5f9;">TOTAL VENTA:</td>
                <td align="right" style="background:#f1f5f9;">$ ${parseFloat(p.total).toLocaleString()}</td>
            </tr></table>`;
            
            API.descargarExcelMHT(htmlPedido, `Pedido_${p.cliente}_${p.id}`, logoBase64);
        }


        async function eliminarReporte(id) {
            if (confirm("¿Eliminar este reporte permanentemente?")) {
                try {
                    const res = await API.deleteReporte(id);
                    if(res.success) {
                        cargarHistorial();
                    }
                } catch(e) { alert("Error al eliminar"); }
            }
        }

        function cerrarModal() { document.getElementById('modal-detalle').style.display = 'none'; }
        function cerrarPedidoModal() { document.getElementById('modal-detalle-pedido').style.display = 'none'; }

        function inicializarFechas() {
            const hoy = new Date();
            const hace30dias = new Date();
            hace30dias.setDate(hoy.getDate() - 30);
            
            document.getElementById('f-inicio').value = API.getFechaLocal(hace30dias);
            document.getElementById('f-fin').value = API.getFechaLocal(hoy);
        }

        window.onload = () => {
            inicializarFechas();
            cargarHistorial();
        };
    </script>
</body>
